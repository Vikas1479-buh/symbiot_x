<!DOCTYPE html>
<html>
<head>
<title>Symbiot AI</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0b0c2a, #000);
    color:white;
    transition:0.3s;
}

/* LIGHT MODE */
.light {
    background:#f4f4f4;
    color:#111;
}

/* STAR EFFECT */
body::after {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity:0.25;
    pointer-events:none;
}
.light::after { display:none; }

/* CONTAINER */
.container {
    max-width:500px;
    margin:auto;
    padding:40px 20px;
    text-align:center;
}

/* TITLE */
h1 {
    font-size:28px;
    margin-bottom:25px;
}

/* FORM BOX */
.form-box {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

/* DROPDOWN */
select {
    width:100%;
    max-width:420px;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:15px;
}

/* FILE BOX */
.file-box {
    width:100%;
    max-width:420px;
    border:2px dashed #10a37f;
    padding:18px;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
    transition:0.3s;
}
.file-box:hover {
    background: rgba(16,163,127,0.1);
}

/* HIDE INPUT */
input[type="file"] {
    display:none;
}

/* BUTTON */
button {
    width:100%;
    max-width:420px;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    background: linear-gradient(135deg, #10a37f, #0e8f6c);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button + button {
    margin-top:10px;
}

button:hover {
    transform:scale(1.03);
    box-shadow:0 0 12px rgba(16,163,127,0.5);
}

/* RESULT */
#result {
    margin-top:30px;
}

/* IMAGE */
img {
    max-width:100%;
    margin-top:15px;
    border-radius:10px;
}

/* TOGGLE BUTTON */
.toggle {
    position:fixed;
    top:15px;
    right:15px;
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    background:#10a37f;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* FOOTER */
.footer {
    position:fixed;
    bottom:0;
    width:100%;
    overflow:hidden;
    height:35px;
    background: rgba(0,0,0,0.5);
}

.scroll-text {
    white-space: nowrap;
    display:inline-block;
    padding-left:100%;
    animation: scroll 12s linear infinite;
    font-size:14px;
    opacity:0.7;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="container">

<h1>🔒 Symbiot AI</h1>

<div class="form-box">

<select id="type">
    <option value="image">🖼 Image</option>
    <option value="pdf">📄 PDF</option>
    <option value="txt">📝 Text</option>
    <option value="docx">📘 Word</option>
</select>

<label class="file-box">
    <span id="fileText">📂 Click to choose file</span>
    <input type="file" id="file" onchange="updateFileName()">
</label>

<!-- 👁️ EYE MASK CHECKBOX -->
<label style="display:flex; align-items:center; gap:8px; max-width:420px; width:100%;">
    <input type="checkbox" id="maskEyes">
    👁️ Mask Eyes
</label>

<button onclick="upload()">Upload & Protect</button>

</div>

<div id="result"></div>

</div>

<!-- PRIVACYX FOOTER -->
<div class="footer">
    <div class="scroll-text">
        🔐 PrivacyX • Secure Your Data • Mask Sensitive Information • AI Protection • 🔐 PrivacyX •
    </div>
</div>

<script>

// THEME
function toggleTheme(){
    document.body.classList.toggle("light");
    let btn = document.getElementById("themeBtn");
    btn.innerText = document.body.classList.contains("light") ? "☀️" : "🌙";
}

// FILE NAME
function updateFileName(){
    let file = document.getElementById("file").files[0];
    document.getElementById("fileText").innerText = file ? file.name : "📂 Click to choose file";
}

// UPLOAD
async function upload(){
    let file = document.getElementById("file").files[0];
    let type = document.getElementById("type").value;
    let maskEyes = document.getElementById("maskEyes").checked;
    let resDiv = document.getElementById("result");

    if(!file){
        alert("Select file");
        return;
    }

    resDiv.innerHTML = "⏳ Processing...";

    let form = new FormData();
    form.append("file", file);
    form.append("type", type);
    form.append("mask_eyes", maskEyes);

    let res = await fetch("http://127.0.0.1:5000/upload", {
        method:"POST",
        body:form
    });

    let data = await res.json();

    let html = "";

    if(type === "image" && data.preview){
        html += `<img src="${data.preview}?t=${Date.now()}">`;
    }

    html += `
        <br>
        <button onclick="downloadFile('${data.download}')">⬇ Download</button>
        <p id="msg"></p>
    `;

    resDiv.innerHTML = html;
}

// DOWNLOAD FIX
function downloadFile(url){
    fetch(url)
    .then(res => {
        if(!res.ok) throw new Error("Download failed");
        return res.blob();
    })
    .then(blob => {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);

        if(url.endsWith(".pdf")) link.download = "masked.pdf";
        else if(url.endsWith(".txt")) link.download = "masked.txt";
        else if(url.endsWith(".docx")) link.download = "masked.docx";
        else link.download = "masked.png";

        link.click();

        setTimeout(()=>{
            document.getElementById("msg").innerText = "✅ Download Successful";
        },300);
    })
    .catch(()=>{
        alert("Download failed");
    });
}

</script>

</body>
</html>
